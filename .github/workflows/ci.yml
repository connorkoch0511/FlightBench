name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simulation:
    name: Build & Test (C++)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run test suite
        run: ./build/flightbench --no-telemetry

  dashboard:
    name: Type-check & Build (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
